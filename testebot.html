<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatBot L'amore</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="testebot.css">
</head>
<body>
<input type="checkbox" id="check">

<div class="sidebar">
    <label for="check" class="menu-toggle">
        <i class="fas fa-bars"></i>
    </label>

    <div class="actions">
        <button class="btn-action active">
            <i class="fas fa-edit"></i> <span>Iniciar Conversa</span>
        </button>
        <button class="btn-action">
            <i class="fas fa-shopping-basket"></i> <span>Produtos</span>
        </button>
        <button class="btn-action btn-yellow">
            <i class="fas fa-robot"></i> <span>Chatbot</span>
        </button>
    </div>

    <hr class="divider">

    <div class="history-container">
        <h3><i class="far fa-comment-alt"></i> <span>Histórico de Conversas</span></h3>
        
        <div class="history-card">
            <div class="card-content">
                <strong>Conversa 1</strong>
                <p>Olá! 👋 Sou seu assistente...</p>
                <div class="card-footer">
                    <span class="badge">1 Msgs</span>
                    <span class="time"><i class="far fa-clock"></i> Agora</span>
                </div>
            </div>
        </div>
        </div>

    <div class="sidebar-footer">
        <div class="stat-row">
            <span>Total de conversas:</span>
            <span>1</span>
        </div>
        <div class="stat-row">
            <span>Conversa ativa:</span>
            <span class="status-pill">Sim</span>
        </div>
    </div>
</div>
        </nav>

</body>
</html>
