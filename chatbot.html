<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot L'amore</title>

    <link rel="icon" type="image/png" href="french-bulldog.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

  
  <link rel="stylesheet" href="chatbot.css ">
</head>
<body>

  <div class="icon-sidebar">
    <button class="icon-btn" onclick="toggleMenu()"><img src="https://img.icons8.com/material-outlined/24/000000/menu--v1.png"/></button>
    <button class="icon-btn" onclick="newConversation()"><img src="https://img.icons8.com/material-outlined/24/000000/edit--v1.png"/></button>
    <button class="icon-btn"><img src="https://img.icons8.com/material-outlined/24/000000/shopping-cart--v1.png"/></button>
    <button class="icon-btn active"><img src="https://img.icons8.com/material-outlined/24/993556/bot.png"/></button>
  </div>

  <div class="main-container">
    <div class="topbar">
      <div class="brand">
        <img src="https://i.ibb.co/L8xS9xH/logo-lamore.png" class="brand-logo" alt="Logo">
        <span class="brand-name">Chatbot L´amore</span>
      </div>
      <div class="topbar-actions">
        <button class="top-icon"><img src="https://img.icons8.com/material-outlined/24/000000/search--v1.png"/></button>
        <button class="top-icon"><img src="https://img.icons8.com/material-outlined/24/000000/appointment-reminders--v1.png"/></button>
        <button class="top-icon"><img src="https://img.icons8.com/material-outlined/24/000000/user-male-circle.png"/></button>
      </div>
    </div>

    <div class="shortcuts-container">
      <p class="shortcut-label">Atalhos Rápidos:</p>
      <div class="shortcuts-row">
        <button class="shortcut-btn" onclick="insertShortcut('ver produtos')">📦 Ver produtos</button>
        <button class="shortcut-btn" onclick="insertShortcut('resumo')">📊 Resumo</button>
        <button class="shortcut-btn" onclick="insertShortcut('convites')">📋 Convites</button>
        <button class="shortcut-btn" onclick="insertShortcut('ajuda')">❔ Ajuda</button>
      </div>
    </div>

    <div class="content-split">
      <div class="chat-wrapper">
        <div class="messages-container" id="messages"></div>
        <div class="input-container">
          <div class="input-box">
            <input type="text" id="chatInput" placeholder='Digite um comando... Ex: "criar um pedido" ou "crie uma lembrancinha"' onkeydown="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()"></button>
          </div>
          <p class="input-hint">💡 Digite "ajuda" para ver todos os comandos disponíveis</p>
        </div>
      </div>

      <div class="quote-sidebar">
        <div class="quote-header">Prévia do Orçamento</div>
        <div id="quoteItems" class="quote-list"></div>
      </div>
    </div>
  </div>

  <script src="chatbot.js"></script>
</body>
</html>
